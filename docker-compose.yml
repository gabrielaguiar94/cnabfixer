services:
  backend:
    build:
      context: ./backend
    container_name: cnabfixer-backend
    ports:
      - "8765:8765"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8765
    container_name: cnabfixer-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped